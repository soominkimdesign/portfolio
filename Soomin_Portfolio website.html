<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Interaction Prototype — Improved Flow</title>
  <style>
    :root{
      --bg:#ffffff;
      --text:#2d2d2d;
      --muted:#8e8e8e;
      --line:#dddddd;
      --panel-shadow:-2px 2px 0 #d9d9d9;
      --card-shadow:18px -14px 30px rgba(0,0,0,0.08), 0 10px 20px rgba(0,0,0,0.05);
      --circle-shadow:0 10px 24px rgba(0,0,0,0.12);
      --placeholder:#ececec;
      --arrow:#bcbcbc;
      --scroll:rgba(185,185,185,0.8);
      --ease:cubic-bezier(0.22,1,0.36,1);
    }
    *{box-sizing:border-box}
    html,body{
      width:100%;height:100%;margin:0;
      overflow:hidden;background:var(--bg);color:var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body{user-select:none}
    .app{width:100%;height:100%;position:relative;overflow:hidden;background:#fff}

    /* ===== TOP CONTROLS ===== */
    .top-controls{
      position:absolute;inset:0;z-index:60;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:24px;
      transition:all .7s var(--ease);
    }
    .top-controls.compact{
      top:0;bottom:auto;justify-content:flex-start;
      padding-top:14px;gap:8px;
    }
    .top-controls.compact .pickers{gap:10px}
    .top-controls.compact .picker{width:130px;height:110px}
    .top-controls.compact .picker-label{font-size:9px}
    .top-controls.compact .apply-btn{height:32px;min-width:90px;font-size:10px}

    .pickers{display:flex;gap:18px;align-items:flex-start}
    .picker-block{display:flex;flex-direction:column;gap:10px;align-items:center}
    .picker-label{
      font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#7c7c7c;
      transition:font-size .4s ease;
    }
    .picker{
      width:180px;height:214px;border:1px solid var(--line);background:#fff;
      position:relative;overflow:hidden;
      transition:width .4s ease,height .4s ease;
    }
    .picker::before,.picker::after{
      content:"";position:absolute;left:0;width:100%;height:46px;
      pointer-events:none;z-index:3;
    }
    .picker::before{top:0;background:linear-gradient(to bottom, rgba(255,255,255,.96), rgba(255,255,255,0))}
    .picker::after{bottom:0;background:linear-gradient(to top, rgba(255,255,255,.96), rgba(255,255,255,0))}
    .picker-center-line{
      position:absolute;left:12px;right:12px;top:50%;height:40px;transform:translateY(-50%);
      border-top:1px solid #ededed;border-bottom:1px solid #ededed;
      z-index:2;pointer-events:none;
    }
    .picker-track{position:absolute;inset:0;cursor:ns-resize;z-index:4}
    .picker-item{
      position:absolute;left:0;width:100%;text-align:center;
      font-size:15px;line-height:1;
      transition:transform .18s ease, opacity .18s ease, filter .18s ease;
      white-space:nowrap;pointer-events:none;
    }

    .apply-btn{
      min-width:118px;height:42px;border:1px solid #d4d4d4;background:#fff;
      box-shadow:var(--panel-shadow);
      display:inline-flex;align-items:center;justify-content:center;
      padding:0 18px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;
      color:#3a3a3a;cursor:pointer;
      transition:transform .1s ease, box-shadow .1s ease, background .12s ease, opacity .2s ease;
    }
    .apply-btn:hover{background:#fafafa}
    .apply-btn:active{transform:translate(1px,1px);box-shadow:none}
    .apply-btn[disabled]{opacity:.55;cursor:not-allowed}

    /* ===== DECK STAGE ===== */
    .deck-stage{
      position:absolute;inset:0;overflow:hidden;background:#fff;
      opacity:0;pointer-events:none;
      transition:opacity .5s ease;
    }
    .deck-stage.active{opacity:1;pointer-events:auto}

    /* ===== ANIMATION CANVAS (new 4-step flow) ===== */
    .anim-canvas{position:absolute;inset:0;pointer-events:none;z-index:15}
    .anim-card{
      position:absolute;width:100px;height:62px;background:#fff;
      border:1px solid #f0f0f0;
      box-shadow:3px -2px 8px rgba(0,0,0,0.06), 0 2px 5px rgba(0,0,0,0.03);
      opacity:0;transition:none;will-change:transform,opacity,left,top,filter;
    }
    .anim-card .anim-card-num{
      position:absolute;bottom:3px;right:6px;font-size:8px;color:#c0c0c0;font-weight:500;
    }
    .anim-card.picked{
      border-color:#d0d0d0;
      box-shadow:4px -3px 12px rgba(0,0,0,0.10), 0 4px 10px rgba(0,0,0,0.06);
    }

    /* ===== DECK ===== */
    .deck{
      position:absolute;left:50%;top:54%;
      width:min(580px, 68vw);height:min(780px, 72vh);
      transform:translate(-50%,-50%);
      overflow:visible;z-index:20;
      opacity:0;transition:opacity .5s ease;
    }
    .deck.visible{opacity:1}

    /* ===== CARDS ===== */
    .card{
      position:absolute;width:100%;height:100%;
      background:#fff;box-shadow:var(--card-shadow);
      overflow:hidden;will-change:transform,opacity,filter;
      transition:transform .7s var(--ease), opacity .4s ease, filter .35s ease;
    }
    .card.exiting{
      transform:translate(-260px, 200px) scale(0.92) !important;
      opacity:0 !important;filter:blur(2px);
      pointer-events:none;z-index:250 !important;
    }

    .card-content{
      width:100%;height:100%;
      overflow-y:auto;overflow-x:hidden;
      padding:34px;
      scrollbar-width:thin;
      scrollbar-color:transparent transparent;
      position:relative;
    }
    .card-content::-webkit-scrollbar{width:8px}
    .card-content::-webkit-scrollbar-track{background:transparent}
    .card-content::-webkit-scrollbar-thumb{background:rgba(185,185,185,0);border-radius:4px}
    .card-content.show-scrollbar{scrollbar-color:var(--scroll) transparent}
    .card-content.show-scrollbar::-webkit-scrollbar-thumb{background:var(--scroll)}

    .card-inner{display:flex;flex-direction:column;gap:22px}
    .card-meta{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding-bottom:8px}
    .card-title{font-size:18px;font-weight:500;letter-spacing:-0.01em}
    .card-sub{font-size:12px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
    .placeholder{width:100%;aspect-ratio:16/9;background:var(--placeholder);flex:0 0 auto}

    /* ===== NAV BUTTONS ===== */
    .circle-btn{
      position:absolute;top:54%;width:52px;height:52px;border-radius:999px;border:none;background:#fff;
      box-shadow:var(--circle-shadow);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;z-index:40;
      transition:transform .12s ease, box-shadow .12s ease, opacity .3s ease;
    }
    .circle-btn svg{
      width:16px;height:16px;stroke:var(--arrow);stroke-width:2.2;fill:none;
      stroke-linecap:round;stroke-linejoin:round;
    }
    .circle-left{
      left:max(24px, calc(50% - min(580px, 68vw)/2 - 76px));
      transform:translateY(-50%);
    }
    .circle-right{
      right:max(24px, calc(50% - min(580px, 68vw)/2 - 76px));
      transform:translateY(-50%);
    }
    .circle-btn.hidden{opacity:0;pointer-events:none}
    .circle-btn:hover{box-shadow:0 12px 28px rgba(0,0,0,0.15)}

    /* ===== HINT & COUNTER ===== */
    .hint{
      position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
      font-size:11px;color:#a5a5a5;letter-spacing:.05em;text-transform:uppercase;
      z-index:10;opacity:0;transition:opacity .4s ease;
    }
    .hint.visible{opacity:1}
    .card-counter{
      position:absolute;left:50%;bottom:40px;transform:translateX(-50%);
      font-size:12px;color:#b0b0b0;letter-spacing:.06em;z-index:10;
      opacity:0;transition:opacity .4s ease;
    }
    .card-counter.visible{opacity:1}

    /* ===== RESPONSIVE ===== */
    @media (max-width:1200px){
      .picker{width:160px}
      .top-controls.compact .picker{width:120px;height:100px}
      .circle-left{left:16px}
      .circle-right{right:16px}
    }
    @media (max-width:760px){
      .pickers{flex-direction:column;align-items:center}
      .picker{width:220px}
      .top-controls.compact .picker{width:170px;height:95px}
      .deck{width:86vw;height:66vh}
      .card-content{padding:20px}
      .circle-btn{width:44px;height:44px}
    }
    @media (prefers-reduced-motion: reduce){
      *{transition:none !important;animation:none !important;scroll-behavior:auto !important}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-controls" id="topControls">
      <div class="pickers">
        <div class="picker-block">
          <div class="picker-label">Category</div>
          <div class="picker" id="pickerCategory">
            <div class="picker-center-line"></div>
            <div class="picker-track"></div>
          </div>
        </div>
        <div class="picker-block">
          <div class="picker-label">Product</div>
          <div class="picker" id="pickerProduct">
            <div class="picker-center-line"></div>
            <div class="picker-track"></div>
          </div>
        </div>
        <div class="picker-block">
          <div class="picker-label">View Mode</div>
          <div class="picker" id="pickerViewMode">
            <div class="picker-center-line"></div>
            <div class="picker-track"></div>
          </div>
        </div>
      </div>
      <button class="apply-btn" id="applyBtn">Apply</button>
    </div>

    <div class="deck-stage" id="deckStage">
      <div class="anim-canvas" id="animCanvas"></div>

      <button class="circle-btn circle-left hidden" id="prevBtn" aria-label="Previous">
        <svg viewBox="0 0 16 16"><path d="M10 3 L5 8 L10 13" /></svg>
      </button>
      <div class="deck" id="deck"></div>
      <button class="circle-btn circle-right hidden" id="nextBtn" aria-label="Next">
        <svg viewBox="0 0 16 16"><path d="M6 3 L11 8 L6 13" /></svg>
      </button>

      <div class="card-counter" id="cardCounter"></div>
      <div class="hint" id="hint">Scroll inside card · keep scrolling for next</div>
    </div>
  </div>

  <script>
    /* ============================================================
       CONFIG
    ============================================================ */
    const config = {
      categories: ["UX/UI","Industrial","Graphic","AI","Objet"],
      products:   ["Device","Robot","Furniture","Package","App/Web"],
      viewModes:  ["Lite","Standard","Deep"],
    };

    /* ============================================================
       PROJECTS (50)
    ============================================================ */
    const pNames = [
      "Mobility Cockpit UX","Mancala Interaction","Service Robot Form Study",
      "Furniture Interaction System","AI Device Experience","Graphic Package Narrative",
      "Web-Based Control Interface","Autonomous Robot Surface Language",
      "Smart Home Dashboard","Wearable Health Monitor","Urban Mobility Hub",
      "Retail Kiosk Interaction","AR Navigation Prototype"
    ];
    const projects = Array.from({length:50},(_,i)=>({
      id:i,
      title: pNames[i%pNames.length]+" "+String(i+1).padStart(2,"0"),
      category:[config.categories[i%config.categories.length]],
      product:[config.products[i%config.products.length]],
      pages:Array.from({length:3+(i%5)},(_,j)=>"p"+(j+1))
    }));

    /* ============================================================
       STATE
    ============================================================ */
    const visibleCount = 6;
    const state = {
      category:0, product:0, viewMode:1,
      filteredProjects:[],
      currentIndex:0,
      animating:false,
      autoScrollCooldown:false,
      initialized:false,
      entering:false,
    };

    /* DOM */
    const topControls = document.getElementById("topControls");
    const deckStage   = document.getElementById("deckStage");
    const animCanvas  = document.getElementById("animCanvas");
    const deck        = document.getElementById("deck");
    const prevBtn     = document.getElementById("prevBtn");
    const nextBtn     = document.getElementById("nextBtn");
    const applyBtn    = document.getElementById("applyBtn");
    const hintEl      = document.getElementById("hint");
    const counterEl   = document.getElementById("cardCounter");

    /* ============================================================
       PICKER
    ============================================================ */
    function createPicker(rootId, items, stateKey){
      const root = document.getElementById(rootId);
      const track = root.querySelector(".picker-track");
      const itemH = 42;
      let startY=0, dragging=false;

      const rendered = items.map(text=>{
        const el=document.createElement("div");
        el.className="picker-item"; el.textContent=text;
        track.appendChild(el); return el;
      });

      const clamp=i=>Math.max(0,Math.min(items.length-1,i));

      function draw(){
        const cY=root.clientHeight/2;
        const sel=state[stateKey];
        rendered.forEach((el,idx)=>{
          const rel=idx-sel;
          const y=cY+rel*itemH;
          const d=Math.abs(rel);
          el.style.top=y+"px";
          el.style.transform="translateY(-50%) scale("+Math.max(0.78,1-d*0.08)+")";
          el.style.opacity=Math.max(0.15,1-d*0.35);
          el.style.filter="blur("+Math.max(0,d-1)*0.8+"px)";
          el.style.fontWeight=d===0?"600":"400";
          el.style.color=d===0?"#2f2f2f":"#9a9a9a";
        });
      }

      track.addEventListener("wheel",e=>{
        e.preventDefault(); e.stopPropagation();
        state[stateKey]=clamp(state[stateKey]+(e.deltaY>0?1:-1));
        draw();
      },{passive:false});

      track.addEventListener("mousedown",e=>{dragging=true;startY=e.clientY;});
      window.addEventListener("mousemove",e=>{
        if(!dragging) return;
        const d=e.clientY-startY;
        if(Math.abs(d)>=itemH*0.55){
          state[stateKey]=clamp(state[stateKey]-Math.sign(d));
          startY=e.clientY; draw();
        }
      });
      window.addEventListener("mouseup",()=>{dragging=false;});

      track.addEventListener("touchstart",e=>{dragging=true;startY=e.touches[0].clientY;},{passive:true});
      track.addEventListener("touchmove",e=>{
        if(!dragging) return;
        const d=e.touches[0].clientY-startY;
        if(Math.abs(d)>=itemH*0.55){
          state[stateKey]=clamp(state[stateKey]-Math.sign(d));
          startY=e.touches[0].clientY; draw();
        }
      },{passive:true});
      track.addEventListener("touchend",()=>{dragging=false;},{passive:true});

      draw();
      new ResizeObserver(()=>draw()).observe(root);
    }

    /* ============================================================
       HELPERS
    ============================================================ */
    function getVisiblePages(proj){
      const m=config.viewModes[state.viewMode];
      if(m==="Lite") return proj.pages.slice(0,2);
      if(m==="Standard") return proj.pages.slice(0,3);
      return proj.pages;
    }

    function scoreProject(proj){
      let s=0;
      if(proj.category.includes(config.categories[state.category])) s+=3;
      if(proj.product.includes(config.products[state.product])) s+=3;
      s += proj.pages.length*0.1;
      return s;
    }

    function getFilteredIndices(){
      const scored = projects.map((p,i)=>({idx:i, score:scoreProject(p)}));
      scored.sort((a,b)=>b.score-a.score);
      const picked = scored.filter(s=>s.score>0).slice(0, Math.max(visibleCount, 14));
      picked.sort((a,b)=>a.idx-b.idx);
      return picked.map(s=>s.idx);
    }

    function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

    /* ============================================================
       NEW ENTRANCE FLOW (4-step)
       1) 50-card cascade stack (left-bottom -> right-top)
       2) Non-picked fade/blur; picked cards "lift"
       3) Picked cards fan into a tidy mini-stack at center
       4) Morph: mini-stack aligns to deck origin, zoom to deck, then reveal big cards
    ============================================================ */
    async function playEntrance(){
      animCanvas.innerHTML="";
      animCanvas.style.transition="none";
      animCanvas.style.transform="none";
      animCanvas.style.opacity="1";

      const W=window.innerWidth, H=window.innerHeight;

      const totalCards=50, cardW=100, cardH=62;

      // Step 1 stack start (more clearly from left-bottom)
      const startX=W*0.18;
      const startY=H*0.72;
      const dx=9;
      const dy=-5.5;

      const pickedIndices = getFilteredIndices();
      const pickedSet = new Set(pickedIndices);

      const cards=[];
      for(let i=0;i<totalCards;i++){
        const el=document.createElement("div");
        el.className="anim-card";
        if(pickedSet.has(i)) el.classList.add("picked");
        const num=document.createElement("span");
        num.className="anim-card-num";
        num.textContent=String(i+1);
        el.appendChild(num);

        const tx=startX + i*dx;
        const ty=startY + i*dy;

        el.style.left=tx+"px";
        el.style.top=ty+"px";
        el.style.width=cardW+"px";
        el.style.height=cardH+"px";
        el.style.zIndex=String(i+10);
        el.style.opacity="0";
        el.style.transform="translate(-40px, 30px) scale(0.84) rotate(-1deg)";

        animCanvas.appendChild(el);
        cards.push({el, index:i, baseX:tx, baseY:ty, picked:pickedSet.has(i)});
      }

      // STEP 1: cascade in
      const cascadeDelay=16;
      cards.forEach((c,i)=>{
        setTimeout(()=>{
          c.el.style.transition="opacity .16s ease, transform .22s ease";
          c.el.style.opacity=String(Math.max(0.34, 1 - i*0.007));
          c.el.style.transform="translate(0,0) scale(1) rotate(0deg)";
        }, i*cascadeDelay);
      });
      await sleep(totalCards*cascadeDelay + 260);

      // STEP 2: de-emphasize non-picked, lift picked
      cards.forEach(c=>{
        if(!c.picked){
          c.el.style.transition="opacity .45s ease, filter .4s ease";
          c.el.style.opacity="0.14";
          c.el.style.filter="blur(1.6px)";
        }else{
          c.el.style.transition="transform .35s cubic-bezier(0.22,1,0.36,1), box-shadow .35s ease";
          c.el.style.transform="translate(0,-10px) scale(1.06)";
          c.el.style.boxShadow="7px -6px 16px rgba(0,0,0,0.12), 0 6px 14px rgba(0,0,0,0.07)";
        }
      });
      await sleep(420);

      // STEP 3: gather picked into neat mini-stack near center
      const pickedCards = cards.filter(c=>c.picked);
      // target anchor for mini-stack
      const gatherX = W*0.52 - cardW*0.78;
      const gatherY = H*0.47;
      const gdx=10, gdy=-6;

      pickedCards.forEach((c,i)=>{
        setTimeout(()=>{
          const tx=gatherX + i*gdx;
          const ty=gatherY + i*gdy;
          c.el.style.transition="left .58s cubic-bezier(0.22,1,0.36,1), top .58s cubic-bezier(0.22,1,0.36,1), opacity .4s ease, transform .5s cubic-bezier(0.22,1,0.36,1), filter .3s ease";
          c.el.style.left=tx+"px";
          c.el.style.top=ty+"px";
          c.el.style.opacity="1";
          c.el.style.filter="none";
          c.el.style.zIndex=String(600+i);
          c.el.style.transform="translate(0,0) scale(1.03)";
        }, i*55);
      });
      await sleep(pickedCards.length*55 + 540);

      // STEP 4: align the mini-stack towards the deck and zoom to it
      // We compute deck center in viewport coordinates
      const deckRect = deck.getBoundingClientRect();
      const deckCenterX = deckRect.left + deckRect.width/2;
      const deckCenterY = deckRect.top  + deckRect.height/2;

      // mini-stack center (rough)
      const miniCenterX = gatherX + (pickedCards.length*gdx)/2 + cardW/2;
      const miniCenterY = gatherY - (pickedCards.length*gdy)/2 + cardH/2;

      // pan animCanvas so mini-stack center meets deck center, then zoom in
      const panX = (deckCenterX - miniCenterX);
      const panY = (deckCenterY - miniCenterY);

      animCanvas.style.transition = "transform .85s cubic-bezier(0.22,1,0.36,1), opacity .55s ease";
      animCanvas.style.transformOrigin = miniCenterX+"px "+miniCenterY+"px";
      animCanvas.style.transform = "translate("+panX+"px,"+panY+"px) scale(6)";
      animCanvas.style.opacity = "0";

      await sleep(720);

      animCanvas.innerHTML="";
      animCanvas.style.transition="none";
      animCanvas.style.transform="none";
      animCanvas.style.opacity="1";
    }

    /* ============================================================
       BUILD & RENDER DECK (actual big cards)
    ============================================================ */
    function buildCard(proj, idx){
      const card=document.createElement("article");
      card.className="card";
      card.dataset.index=idx;

      const content=document.createElement("div");
      content.className="card-content";
      const inner=document.createElement("div");
      inner.className="card-inner";

      const meta=document.createElement("div");
      meta.className="card-meta";
      meta.innerHTML =
        '<div><div class="card-title">'+proj.title+'</div>'+
        '<div class="card-sub">'+proj.category.join(" · ")+' / '+proj.product.join(" · ")+'</div></div>'+
        '<div class="card-sub">'+config.viewModes[state.viewMode]+'</div>';
      inner.appendChild(meta);

      getVisiblePages(proj).forEach(()=>{
        const ph=document.createElement("div");
        ph.className="placeholder";
        inner.appendChild(ph);
      });

      content.appendChild(inner);
      card.appendChild(content);
      attachScroll(content);
      return card;
    }

    function attachScroll(content){
      let timer=null;
      function showSB(){
        content.classList.add("show-scrollbar");
        clearTimeout(timer);
        timer=setTimeout(()=>content.classList.remove("show-scrollbar"), 900);
      }
      content.addEventListener("wheel",e=>{
        showSB();
        const max=content.scrollHeight - content.clientHeight;
        const atBottom = max - content.scrollTop < 12;
        if(e.deltaY>0 && atBottom && !state.animating && !state.autoScrollCooldown){
          e.preventDefault();
          state.autoScrollCooldown=true;
          nextCard();
          setTimeout(()=>{state.autoScrollCooldown=false;}, 800);
        }
      },{passive:false});
      content.addEventListener("scroll",showSB,{passive:true});
    }

    function renderDeck(){
      deck.innerHTML="";
      state.filteredProjects.forEach((proj,i)=>{
        deck.appendChild(buildCard(proj,i));
      });
    }

    /* ============================================================
       STACK PLACEMENT (right-top direction)
    ============================================================ */
    function placeStack(){
      const cards=deck.querySelectorAll(".card");
      cards.forEach((card,i)=>{
        const depth=i - state.currentIndex;
        if(depth < 0 || depth >= visibleCount){
          card.style.opacity="0";
          card.style.pointerEvents="none";
          card.style.zIndex="0";
          return;
        }
        const x=depth*34;
        const y=-depth*24;
        const sc=1 - depth*0.012;
        const bl=depth>0 ? depth*0.35 : 0;

        card.style.zIndex=String(200-depth);
        card.style.opacity=depth<3 ? "1" : String(Math.max(0.3, 1-depth*0.15));
        card.style.pointerEvents=depth===0 ? "auto" : "none";
        card.style.filter=bl>0 ? "blur("+bl+"px)" : "none";
        card.style.transform="translate("+x+"px,"+y+"px) scale("+sc+")";

        if(depth===0){
          const ct=card.querySelector(".card-content");
          if(ct) ct.scrollTop=0;
        }
      });
      updateNav();
      updateCounter();
    }

    /* ============================================================
       NAV
    ============================================================ */
    function updateNav(){
      prevBtn.classList.toggle("hidden", state.currentIndex<=0 || state.animating || state.entering);
      nextBtn.classList.toggle("hidden", state.currentIndex>=state.filteredProjects.length-1 || state.animating || state.entering);
    }
    function updateCounter(){
      counterEl.textContent=(state.currentIndex+1)+" / "+state.filteredProjects.length;
    }

    /* ============================================================
       NEXT / PREV
    ============================================================ */
    function nextCard(){
      if(state.animating || state.entering) return;
      if(state.currentIndex >= state.filteredProjects.length-1) return;
      const cards=deck.querySelectorAll(".card");
      const cur=cards[state.currentIndex];
      if(!cur) return;

      state.animating=true;
      cur.classList.add("exiting");
      cur.style.pointerEvents="none";
      state.currentIndex++;

      setTimeout(()=>{
        cur.classList.remove("exiting");
        placeStack();
        state.animating=false;
        updateNav();
      }, 580);
    }

    function prevCard(){
      if(state.animating || state.entering) return;
      if(state.currentIndex <= 0) return;
      const cards=deck.querySelectorAll(".card");
      const prevI=state.currentIndex - 1;
      const inc=cards[prevI];
      if(!inc) return;

      state.animating=true;

      inc.style.transition="none";
      inc.style.opacity="0";
      inc.style.transform="translate(-260px, 200px) scale(0.92)";
      inc.style.filter="blur(2px)";
      inc.style.zIndex="250";
      inc.style.pointerEvents="none";

      requestAnimationFrame(()=>{
        requestAnimationFrame(()=>{
          inc.style.transition="";
          state.currentIndex--;
          placeStack();
          setTimeout(()=>{
            state.animating=false;
            updateNav();
          }, 600);
        });
      });
    }

    /* ============================================================
       START / APPLY
    ============================================================ */
    async function startSequence(){
      if(state.entering) return;
      state.entering = true;

      // Filter
      const pickedIndices=getFilteredIndices();
      state.filteredProjects=pickedIndices.map(i=>projects[i]);
      state.currentIndex=0;

      // UI states
      applyBtn.disabled = true;
      topControls.classList.add("compact");
      deckStage.classList.add("active");
      deck.classList.remove("visible");
      prevBtn.classList.add("hidden");
      nextBtn.classList.add("hidden");
      hintEl.classList.remove("visible");
      counterEl.classList.remove("visible");

      // Render big deck (hidden during entrance)
      renderDeck();

      // Run entrance then reveal
      await sleep(260);
      await playEntrance();

      deck.classList.add("visible");
      placeStack();
      hintEl.classList.add("visible");
      counterEl.classList.add("visible");

      state.initialized=true;
      state.entering=false;
      applyBtn.disabled = false;
      updateNav();
    }

    /* ============================================================
       EVENTS
    ============================================================ */
    applyBtn.addEventListener("click", startSequence);

    [prevBtn, nextBtn].forEach(btn=>{
      btn.addEventListener("mousedown",()=>{
        btn.style.transform="translateY(calc(-50% + 2px)) scale(0.95)";
        btn.style.boxShadow="0 6px 16px rgba(0,0,0,0.10)";
      });
      btn.addEventListener("mouseup",()=>{
        btn.style.transform="translateY(-50%)"; btn.style.boxShadow="";
      });
      btn.addEventListener("mouseleave",()=>{
        btn.style.transform="translateY(-50%)"; btn.style.boxShadow="";
      });
    });

    prevBtn.addEventListener("click", prevCard);
    nextBtn.addEventListener("click", nextCard);

    document.addEventListener("keydown",e=>{
      if(!state.initialized) return;
      if(e.key==="ArrowRight"||e.key==="ArrowDown") nextCard();
      if(e.key==="ArrowLeft" ||e.key==="ArrowUp")   prevCard();
    });

    /* ============================================================
       INIT
    ============================================================ */
    createPicker("pickerCategory", config.categories, "category");
    createPicker("pickerProduct",  config.products,   "product");
    createPicker("pickerViewMode", config.viewModes,   "viewMode");
  </script>
</body>
</html>
